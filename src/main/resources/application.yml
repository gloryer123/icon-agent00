spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/school_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 12345678

mybatis:
  # 指定 XML 映射文件的位置
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰命名自动映射 (tuition_rmb -> tuitionRmb)
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
# Knife4j 增强配置
knife4j:
  enable: true # 开启增强功能
  setting:
    language: zh_cn # 界面语言

# 大模型相关配置
llm:
  api-url: http://154.44.25.190:11434/api/generate
  model-name: qwen3.5-9b-q8:latest